name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    env:
      # Run pygame with no real display or audio device.
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # This repo uses Requirements.txt (capital R); point the pip cache at
          # the real files so the case-sensitive Linux runner finds them.
          cache-dependency-path: |
            Requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest -q

      - name: Headless smoke test (boot + 200 frames)
        run: SELFTEST_FRAMES=200 python main.py
