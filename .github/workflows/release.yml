name: Build & Release

# Builds a standalone Windows .exe. Pushing a version tag (e.g. v1.0.0)
# publishes it as a downloadable GitHub Release asset. A manual run just
# uploads the .exe as a workflow artifact for testing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write        # required to create/update Releases

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Requirements.txt pyinstaller pillow

      - name: Generate application icon
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          python -c "import pygame; pygame.init(); from game import sprites; img=pygame.transform.smoothscale(sprites.make_player_frames(5)[0],(256,256)); pygame.image.save(img,'icon256.png')"
          python -c "from PIL import Image; Image.open('icon256.png').save('app.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])"

      - name: Build standalone EXE
        run: >
          pyinstaller --onefile --windowed
          --name SpaceAdventure
          --icon app.ico
          --add-data "pic;pic"
          main.py

      - name: Smoke-test the built EXE
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
          SELFTEST_FRAMES: "60"
        run: ./dist/SpaceAdventure.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceAdventure-windows
          path: dist/SpaceAdventure.exe

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpaceAdventure.exe
          generate_release_notes: true
          name: Space Adventure ${{ github.ref_name }}
